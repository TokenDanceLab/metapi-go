name: CI

on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
      - name: Run golangci-lint
        run: golangci-lint run --timeout=3m

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - run: go vet ./...

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  mod-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - run: go mod download
      - run: go mod verify

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - name: Run gitleaks
        run: go run github.com/zricethezav/gitleaks/v8@v8.28.0 detect --source . --no-git --redact --verbose

  docs-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - run: go test ./docs -run TestPublicMarkdownHygiene -count=1

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run audit:prod
      - run: npm run typecheck:web
      - run: npm run typecheck:web:test
      - run: npm test
      - run: npm run build:web

  test-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - run: go test ./... -count=1 -race

  test-pg:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: metapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - run: |
          dsn="${PG_SCHEME}://${PG_USER}:${PG_PASSWORD}@localhost:5432/${PG_DATABASE}?sslmode=disable"
          PG_TEST_DSN="$dsn" DATABASE_URL="$dsn" go test ./... -count=1 -tags=integration
        env:
          PG_SCHEME: postgres
          PG_USER: postgres
          PG_PASSWORD: test
          PG_DATABASE: metapi_test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - run: mkdir -p web/dist
      - run: go build -trimpath ./cmd/server
      - run: go build -trimpath ./cmd/migrate

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - lint
      - vet
      - vulncheck
      - mod-verify
      - secret-scan
      - docs-hygiene
      - frontend
      - test-sqlite
      - test-pg
      - build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: metapi-go:ci
          load: true
      - name: Smoke Docker image
        run: |
          set -euo pipefail
          name=metapi-ci-smoke
          port=49040
          docker rm -f "$name" >/dev/null 2>&1 || true
          trap 'docker rm -f "$name" >/dev/null 2>&1 || true' EXIT
          docker run -d --name "$name" \
            -p "127.0.0.1:${port}:4000" \
            -e AUTH_TOKEN=ci-admin-token \
            -e PROXY_TOKEN=ci-proxy-token \
            metapi-go:ci

          ready=
          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${port}/ready" | grep -q '"status":"ok"'; then
              ready=1
              break
            fi
            sleep 1
          done

          if [ -z "$ready" ]; then
            docker logs "$name"
            exit 1
          fi

          curl -fsS "http://127.0.0.1:${port}/health" | grep -q '"status":"ok"'
          curl -fsS "http://127.0.0.1:${port}/ready" | grep -q '"database":"ok"'
