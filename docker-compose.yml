services:
  metapi:
    build: .
    container_name: metapi-go
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./data:/app/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64M
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    env_file:
      - .env
    environment:
      AUTH_TOKEN: ${AUTH_TOKEN:?Set AUTH_TOKEN in .env}
      PROXY_TOKEN: ${PROXY_TOKEN:?Set PROXY_TOKEN in .env}
