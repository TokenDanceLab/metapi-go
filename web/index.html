<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta name="description" content="Metapi - 中转站的中转站，聚合多个 AI API 中转站为统一网关" />
  <title>Metapi</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <!-- FOUC: theme_mode-first bootstrap before any CSS/fonts (mirrors web/themeBootstrap.ts) -->
  <script>
    (function () {
      try {
        var mode = localStorage.getItem('theme_mode');
        var theme;
        if (mode === 'light' || mode === 'dark') {
          theme = mode;
        } else if (mode === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        } else {
          var legacy = localStorage.getItem('theme');
          if (legacy === 'light' || legacy === 'dark') {
            theme = legacy;
          } else {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
        }
        var root = document.documentElement;
        root.setAttribute('data-theme', theme);
        root.style.colorScheme = theme;
        var bg = theme === 'dark' ? '#0b0f14' : '#eef2f6';
        root.style.backgroundColor = bg;
        if (document.body) {
          document.body.style.backgroundColor = bg;
        } else {
          document.addEventListener('DOMContentLoaded', function () {
            if (document.body) document.body.style.backgroundColor = bg;
          });
        }
      } catch (e) {
        /* storage / matchMedia unavailable — leave browser defaults */
      }
    })();
  </script>
  <!-- System fonts only — no Google Fonts CDN (ops console / CSP-friendly) -->
</head>
<body class="min-h-screen">
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
