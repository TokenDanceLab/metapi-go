linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
  disable:
    - unused
    - gosimple

issues:
  exclude-rules:
    # Allow intentional error discards in defer Close(), tx.Rollback(), Flush.
    - path: ".go"
      linters: [errcheck]
      text: "Error return value of .*(Close|Rollback|Flush). is not checked"

    # TS-parity packages: fire-and-forget DB/notify operations match original
    - path: "handler/admin/.*\\.go"
      linters: [errcheck]
    - path: "handler/proxy/.*\\.go"
      linters: [errcheck]
    - path: "handler/shared/.*\\.go"
      linters: [errcheck]
    - path: "service/.*\\.go"
      linters: [errcheck]
    - path: "scheduler/.*\\.go"
      linters: [errcheck]
    - path: "platform/.*\\.go"
      linters: [errcheck]

    # Test-only issues
    - path: "_test\\.go"
      linters: [errcheck, ineffassign, staticcheck]

    # Staticcheck: deprecated RealIP is a known risk
    - path: "router/middleware\\.go"
      linters: [staticcheck]
      text: "SA1019"

    # Staticcheck: TS-parity regex in platform/newapi.go
    - path: "platform/newapi\\.go"
      linters: [staticcheck]
      text: "SA1000"

    # proxy/endpoint_flow.go: rawErrText kept for debugging
    - path: "proxy/endpoint_flow\\.go"
      linters: [staticcheck]
      text: "SA4006"

    # app/health.go + app/metrics.go: w.Write best-effort in health/metrics handlers
    - path: "app/.*\\.go"
      linters: [errcheck]

    # routing/router.go: empty branches are TS-parity (conditional model lookup)
    - path: "routing/router\\.go"
      linters: [staticcheck]
      text: "SA9003"

    # router/router.go: w.Write in SPA fallback is best-effort
    - path: "router/router\\.go"
      linters: [errcheck]
