linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

issues:
  exclude-rules:
    # Exclude all errcheck in test files
    - path: "_test\\.go"
      linters:
        - errcheck
    # Intentionally-ignored patterns in source
    - linters:
        - errcheck
      text: "Error return value of `(json\\.Unmarshal|db\\.Exec|db\\.Get|tx\\.Rollback|tx\\.Get|w\\.Write)`"
